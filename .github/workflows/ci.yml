name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (build + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore src/BucketBudget.Api/BucketBudget.Api.csproj

      - name: Build
        run: dotnet build src/BucketBudget.Api/BucketBudget.Api.csproj -c Release --no-restore

  frontend:
    name: Frontend (lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/BucketBudget.Web
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/BucketBudget.Web/package-lock.json

      - name: Install
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f src/BucketBudget.Api/Dockerfile src/

      - name: Build Web image
        run: docker build -f src/BucketBudget.Web/Dockerfile src/BucketBudget.Web/
